<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送信完了｜Tipxique</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230b1a30'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='%23c9a962' font-family='Georgia'>T</text></svg>">
<style>
.thanks {
  min-height: 100svh;
  display: flex; align-items: center; justify-content: center;
  background:
    radial-gradient(ellipse 900px 600px at 78% 18%, rgba(26, 51, 87, .9) 0%, transparent 60%),
    linear-gradient(160deg, var(--navy-900) 0%, var(--navy-800) 100%);
  padding: 24px;
}
.thanks__box {
  max-width: 560px; width: 100%; text-align: center;
  background: var(--white); border-radius: 6px;
  padding: 64px 44px 52px;
  box-shadow: 0 30px 80px rgba(0, 0, 0, .35);
}
.thanks__check {
  width: 72px; height: 72px; margin: 0 auto 28px;
  border-radius: 50%;
  background: linear-gradient(140deg, var(--navy-700), var(--navy-900));
  display: flex; align-items: center; justify-content: center;
}
.thanks__check svg { width: 36px; height: 36px; fill: none; stroke: var(--gold-light); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
.thanks__title { font-family: var(--font-serif); font-size: 26px; letter-spacing: .06em; margin-bottom: 18px; }
.thanks__text { font-size: 14px; color: var(--ink-soft); margin-bottom: 36px; }
.thanks__logo { font-family: var(--font-latin); font-size: 22px; color: var(--navy-800); letter-spacing: .08em; margin-bottom: 32px; }
</style>
</head>
<body>
<div class="thanks">
  <div class="thanks__box">
    <p class="thanks__logo">Tipxique</p>
    <div class="thanks__check"><svg viewBox="0 0 48 48"><path d="M10 25l10 10 18-22"/></svg></div>
    <h1 class="thanks__title">送信が完了しました</h1>
    <p class="thanks__text">お問い合わせいただきありがとうございます。<br>
    内容を確認のうえ、通常2営業日以内に<br>担当者よりご返信いたします。</p>
    <a href="./" class="btn btn--gold">トップページへ戻る</a>
  </div>
</div>
</body>
</html>
